<h1>Упражнения</h1>

<nav>
  <a href="{% url 'index' %}">Главная</a> |
  <a href="{% url 'workout_list' %}">Мои тренировки</a> |
  <a href="{% url 'favorite_exercises' %}">Избранное</a> |
  <a href="{% url 'plan_list' %}">План</a> |
  <a href="{% url 'premade_workouts' %}">Готовые тренировки</a> |
  <a href="{% url 'workout_history_list' %}">История</a> |
  <a href="{% url 'profile' %}">Профиль</a> |

  <form method="post" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Выйти</button>
  </form>
</nav>

<hr>

<h3>Поиск и фильтры</h3>

<form method="get">
  <div>
    <label>Поиск по названию:</label><br>
    <input type="text" name="search" value="{{ search_query|default:'' }}" placeholder="Например: жим">
  </div>

  <br>

  <div>
    <label>Группа мышц:</label><br>
    <select name="muscle_group">
      <option value="">Все</option>
      {% for group in muscle_groups %}
        <option value="{{ group.id }}" {% if selected_muscle_group == group.id|stringformat:"s" %}selected{% endif %}>
          {{ group.name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <br>

  <div>
    <label>Сложность:</label><br>
    <select name="difficulty">
      <option value="">Все</option>
      <option value="beginner" {% if selected_difficulty == "beginner" %}selected{% endif %}>Начинающий</option>
      <option value="intermediate" {% if selected_difficulty == "intermediate" %}selected{% endif %}>Средний</option>
      <option value="advanced" {% if selected_difficulty == "advanced" %}selected{% endif %}>Продвинутый</option>
    </select>
  </div>

  <br>

  <div>
    <label>Сортировка:</label><br>
    <select name="sort">
      <option value="">Без сортировки</option>
      <option value="name_asc" {% if selected_sort == "name_asc" %}selected{% endif %}>Название (А-Я)</option>
      <option value="name_desc" {% if selected_sort == "name_desc" %}selected{% endif %}>Название (Я-А)</option>
    </select>
  </div>

  <br>

  <button type="submit">Применить</button>
  <a href="{% url 'exercise_list' %}">Сбросить</a>
</form>

<hr>

<h3>Список упражнений</h3>

<ul>
  {% for exercise in exercises %}
    <li>
      <a href="{% url 'exercise_detail' exercise.id %}">
        {{ exercise.name }}
      </a>
    </li>
  {% empty %}
    <li>Упражнения не найдены</li>
  {% endfor %}
</ul>
